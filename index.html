<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Control Envases</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* Estilo Base SCADA Dark */
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #1a1c1e;
      margin: 0;
      padding: 20px;
      color: #e0e0e0;
    }

    h2 { 
      color: #00ffcc; 
      font-size: 1.1rem;
      border-left: 4px solid #00ffcc;
      padding-left: 10px;
      margin-top: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Tabs Estilo HMI */
    .tabs { 
      display: flex; 
      gap: 5px; 
      margin-bottom: 0; 
      border-bottom: 2px solid #333;
    }

    .tab {
      padding: 12px 25px;
      cursor: pointer;
      background: #2d2d2d;
      border: 1px solid #444;
      border-bottom: none;
      border-radius: 5px 5px 0 0;
      transition: all 0.2s;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .tab:hover { background: #3d3d3d; color: #fff; }

    .tab.active {
      background: #333;
      color: #00ffcc;
      border-top: 3px solid #00ffcc;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background-color: #ff3333;
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      display: none;
      box-shadow: 0 0 8px rgba(255,51,51,0.5);
    }

    .tab-content {
      display: none;
      background: #25282a;
      padding: 25px;
      border: 1px solid #333;
      border-top: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .tab-content.active { display: block; }

    .box {
      background: #2d3033;
      padding: 20px;
      border: 1px solid #3d4144;
      border-radius: 4px;
    }

    label {
      font-size: 0.75rem;
      color: #aaa;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 5px;
      display: block;
    }

    select, input {
      background: #1a1c1e;
      border: 1px solid #444;
      color: #00ffcc;
      padding: 8px;
      border-radius: 3px;
      margin-bottom: 15px;
      width: 100%;
      box-sizing: border-box;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #00ffcc;
      box-shadow: 0 0 5px rgba(0,255,204,0.3);
    }

    button {
      padding: 12px 24px;
      border: 1px solid #008f7a;
      background: linear-gradient(to bottom, #00b395, #007a66);
      color: white;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.2s;
    }

    button:hover { 
      background: linear-gradient(to bottom, #00d1ae, #008f7a);
      box-shadow: 0 0 10px rgba(0,255,204,0.4);
    }

    button.btn-eliminar {
      padding: 5px 10px;
      font-size: 0.7rem;
      background: #444;
      border: 1px solid #666;
      margin-top: 10px;
    }

    button.btn-eliminar:hover {
      background: #666;
    }

    button:disabled {
      background: #444;
      border-color: #555;
      cursor: not-allowed;
    }

    .charts-container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }

    .chart-box {
      flex: 1;
      min-width: 45%;
      background: #1e2124;
      padding: 15px;
      border: 1px solid #333;
      border-radius: 4px;
    }

    .form-grid-2col { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 30px; 
    }

    .col {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 5px;
      align-items: center;
    }

    /* Alertas con Estilo Industrial */
    .alert-card {
      background: linear-gradient(90deg, #3a1c1c 0%, #25282a 100%);
      border: 1px solid #ff3333;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 6px solid #ff3333;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .alert-card h3 { margin: 0 0 5px 0; color: #ff6666; font-size: 0.9rem; letter-spacing: 1px;}
    .alert-card p { margin: 0; font-size: 0.85rem; color: #ddd; }
    .no-alerts { color: #00ffcc; text-align: center; padding: 40px; border: 1px dashed #333; background: rgba(0,255,204,0.02); }

    #hora, #fecha { display: none; }
  </style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="cambiarTab('ingreso')">Terminal de Entrada</div>
  <div class="tab" onclick="cambiarTab('visualizacion')">Monitor de Tendencias</div>
  <div class="tab" onclick="cambiarTab('resumen'); actualizarResumen();" style="position:relative">
    Registro de Alarmas
    <span id="badge-alertas" class="badge">0</span>
  </div>
</div>

<div id="ingreso" class="tab-content active">
  <div class="box">
    <h2>Registro de Parámetros de Campo</h2>
    
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
      <div>
        <label>Unidad/Máquina</label>
        <select id="maquina" onchange="gestionarVisibilidadIngreso()"></select>
      </div>
      <div>
        <label>Categoría</label>
        <select id="tipo" onchange="gestionarVisibilidadIngreso()"></select>
      </div>
      <div>
        <label>Subsistema</label>
        <select id="motor" onchange="gestionarVisibilidadIngreso()"></select>
      </div>
    </div>

    <input type="time" id="hora"><input type="date" id="fecha">

    <div class="form-grid-2col">
      <div class="col" id="col-rst">
        <label id="label-r">Amp Fase R:</label><input type="number" id="r" step="0.1">
        <label id="label-s">Amp Fase S:</label><input type="number" id="s" step="0.1">
        <div id="wrapper-t" style="display: contents;">
          <label id="label-t">Amp Fase T:</label><input type="number" id="t" step="0.1">
        </div>
      </div>
      <div class="col">
        <label id="label-tf">Temp F:</label><input type="number" id="tf" step="0.1">
        <div id="wrapper-tb" style="display: contents;">
          <label id="label-tb">Temp B:</label><input type="number" id="tb" step="0.1">
        </div>
        <div id="wrapper-tc" style="display: contents;">
          <label id="label-tc">Temp C:</label><input type="number" id="tc" step="0.1">
        </div>
      </div>
    </div><br>
    
    <div style="text-align: right;">
      <button id="btnGuardar" onclick="enviarDatos()">Ejecutar Carga de Datos</button>
    </div>
  </div>
</div>

<div id="visualizacion" class="tab-content">
  <div class="box">
    <h2>Filtros de Análisis de Telemetría</h2>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: end;">
      <div><label>Máquina</label><select id="filtroMaquina" onchange="gestionarVisibilidadVisualizacion()"></select></div>
      <div><label>Tipo</label><select id="filtroTipo" onchange="gestionarVisibilidadVisualizacion()"></select></div>
      <div><label>Equipo</label><select id="filtroMotor" onchange="gestionarVisibilidadVisualizacion()"></select></div>
      <button onclick="loadData()">Actualizar Gráficos</button>
    </div>
  </div>

  <div class="charts-container">
    <div class="chart-box" id="container-chartRST">
      <h2 id="titulo-grafico1">Tendencia de Amperaje</h2>
      <canvas id="chartRST"></canvas>
    </div>
    <div class="chart-box">
      <h2 id="titulo-grafico2">Tendencia Térmica</h2>
      <canvas id="chartTFTBTC"></canvas>
    </div>
  </div>
</div>

<div id="resumen" class="tab-content">
  <div class="box">
    <h2>Historial de Alarmas Predictivas</h2>
    <div id="lista-alertas"></div>
  </div>
</div>

<script>
// Configuración de Chart.js
Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#333';

const sheetURL = "https://script.google.com/macros/s/AKfycbzw9qjfWV0otwkTh7iFImbuZ9Sq1pkoHl5EphWyBvTcfOLa1KLsSkbShDFljewvLQ2B/exec";
let chart1, chart2, globalData = [];
let alarmasSilenciadas = JSON.parse(localStorage.getItem('alarmasSilenciadas')) || [];
let alarmasNotificadas = []; // Para no repetir notificaciones de la misma sesión

const normalizar = (t) => t ? t.toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

// Solicitar permiso de notificaciones al cargar
if ("Notification" in window) {
  Notification.requestPermission();
}

function dispararNotificacion(titulo, cuerpo) {
  if (Notification.permission === "granted") {
    new Notification(titulo, {
      body: cuerpo,
      icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png"
    });
  }
}

function cambiarTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const targetTab = document.querySelector(`[onclick*="${tab}"]`);
  if(targetTab) targetTab.classList.add('active');
  document.getElementById(tab).classList.add('active');
}

function evaluarAlertaPersistente(serie) {
  if (serie.length < 3) return false;
  
  let estadoAlerta = false;
  let subidasSeguidas = 0;
  let bajadasSeguidas = 0;

  for (let i = 1; i < serie.length; i++) {
    if (serie[i] > serie[i-1]) {
      subidasSeguidas++;
      bajadasSeguidas = 0;
      if (subidasSeguidas >= 2) estadoAlerta = true;
    } 
    else if (serie[i] < serie[i-1]) {
      bajadasSeguidas++;
      subidasSeguidas = 0;
      if (bajadasSeguidas >= 2) estadoAlerta = false;
    }
    else {
      subidasSeguidas = 0;
      bajadasSeguidas = 0;
    }
  }
  return estadoAlerta;
}

function eliminarAlarma(id) {
    if(!alarmasSilenciadas.includes(id)) {
        alarmasSilenciadas.push(id);
        localStorage.setItem('alarmasSilenciadas', JSON.stringify(alarmasSilenciadas));
        actualizarResumen();
    }
}

function actualizarBadge() {
  const ids = [...new Set(globalData.map(r => `${r[0]}|${r[1]}|${r[2]}`))];
  let contadorTotal = 0;
  ids.forEach(id => {
    if (alarmasSilenciadas.includes(id)) return;

    const [m, t, e] = id.split('|');
    const filtrados = globalData.filter(r => r[0]===m && r[1]===t && r[2]===e);
    
    const vars = m === "BD04" 
        ? [{n:'R', i:5}, {n:'S', i:6}, {n:'TF', i:8}, {n:'TB', i:9}, {n:'TC', i:10}]
        : [{n:'R', i:5}, {n:'S', i:6}, {n:'T', i:7}, {n:'TF', i:8}, {n:'TB', i:9}, {n:'TC', i:10}];

    let tieneAlerta = false;
    vars.forEach(v => {
      const serie = filtrados.map(r => Number(r[v.i])).filter(val => val !== 0);
      if (evaluarAlertaPersistente(serie)) tieneAlerta = true;
    });
    if (tieneAlerta) contadorTotal++;
  });
  const badge = document.getElementById('badge-alertas');
  if (badge) {
    if (contadorTotal > 0) { badge.innerText = contadorTotal; badge.style.display = 'block'; }
    else { badge.style.display = 'none'; }
  }
}

function actualizarResumen() {
  const contenedor = document.getElementById('lista-alertas');
  if (!contenedor) return;
  contenedor.innerHTML = "";
  const ids = [...new Set(globalData.map(r => `${r[0]}|${r[1]}|${r[2]}`))];
  let huboAlertasVisibles = false;

  ids.forEach(id => {
    if (alarmasSilenciadas.includes(id)) return;

    const [m, t, e] = id.split('|');
    const tNorm = normalizar(t);
    const eNorm = normalizar(e);
    
    const esCaja = (tNorm === "caja" || tNorm === "aire" || tNorm === "agua chiller" || tNorm === "agua torre");
    const esServo = (tNorm === "servo");
    const esEspecial = (tNorm === "hidraulico" || tNorm === "lubricacion" || esCaja);
    const esIntercambiador = (eNorm === "intercambiador");
    
    let labelR = esServo ? "RPM" : "Amperaje R";
    let labelS = esServo ? "CARGA (A)" : "Amperaje S";
    let labelT = esServo ? "TORQUE" : "Amperaje T";
    let labelF = esServo ? "T MOTOR" : (esCaja ? (tNorm === "caja" ? "TEMP CAJA" : "TEMP") : ((esEspecial || (tNorm === "hidraulico" && eNorm === "reservorio")) ? "NIVEL" : (esIntercambiador ? "INGRESO" : "T-FRON")));
    let labelB = esServo ? "T DRIVE" : (esIntercambiador ? "RETORNO" : "T-BOB");
    let labelC = "T-CARA";

    const filtrados = globalData.filter(r => r[0]===m && r[1]===t && r[2]===e);
    
    let vars = [{n:labelR, i:5}, {n:labelS, i:6}];
    if (m !== "BD04" || esServo) vars.push({n:labelT, i:7});
    vars.push({n:labelF, i:8}, {n:labelB, i:9});
    if(!esServo) vars.push({n:labelC, i:10});

    let activas = [];
    vars.forEach(v => {
      const serie = filtrados.map(r => Number(r[v.i])).filter(val => val !== 0);
      if (evaluarAlertaPersistente(serie)) activas.push(v.n);
    });

    if (activas.length > 0) {
      huboAlertasVisibles = true;
      contenedor.innerHTML += `
        <div class="alert-card">
          <div>
            <h3>MÁQUINA: ${m} | TIPO: ${t} | EQUIPO: ${e}</h3>
            <p>⚠️ ALERTA: Tendencia de alza detectada en: <b>${activas.join(', ')}</b></p>
          </div>
          <button class="btn-eliminar" onclick="eliminarAlarma('${id}')">REVISADO / ELIMINAR</button>
        </div>`;

      if (!alarmasNotificadas.includes(id)) {
        dispararNotificacion(`¡ALERTA PREDICTIVA!`, `Máquina ${m} (${e}) presenta alza en: ${activas.join(', ')}`);
        alarmasNotificadas.push(id);
      }
    }
  });

  if (!huboAlertasVisibles) contenedor.innerHTML = '<div class="no-alerts">SISTEMAS OPERANDO DENTRO DE PARÁMETROS NORMALES O ALERTAS REVISADAS</div>';
  actualizarBadge();
}

function gestionarVisibilidadIngreso() {
  const maquina = document.getElementById('maquina').value;
  const tipo = normalizar(document.getElementById('tipo').value);
  const motor = normalizar(document.getElementById('motor').value);
  const colRST = document.getElementById('col-rst'), 
        wB = document.getElementById('wrapper-tb'), 
        wC = document.getElementById('wrapper-tc'), 
        lR = document.getElementById('label-r'),
        lS = document.getElementById('label-s'),
        lT = document.getElementById('label-t'),
        lF = document.getElementById('label-tf'),
        lB = document.getElementById('label-tb'),
        lC = document.getElementById('label-tc'),
        wT = document.getElementById('wrapper-t');

  const esCaja = (tipo === "caja" || tipo === "aire" || tipo === "agua chiller" || tipo === "agua torre");
  const esServo = (tipo === "servo");
  const esEspecial = (tipo === "hidraulico" || tipo === "lubricacion" || esCaja);
  const esIntercambiador = (motor === "intercambiador");

  colRST.style.display = (esEspecial || esIntercambiador || (tipo === "hidraulico" && motor === "reservorio")) ? "none" : "grid";
  if(esServo) colRST.style.display = "grid"; 

  wT.style.display = (maquina === "BD04" && !esServo) ? "none" : "contents";

  if (esServo) {
    lR.innerText = "RPM:"; lS.innerText = "Carga (A):"; lT.innerText = "Torque (Nm):";
    lF.innerText = "T Motor (°C):"; lB.innerText = "T Drive (°C):";
    wB.style.display = "contents"; wC.style.display = "none";
  } else if (esIntercambiador) {
    wB.style.display = "contents"; wC.style.display = "none";
    lF.innerText = "Ingreso (°C):"; lB.innerText = "Retorno (°C):";
    lR.innerText = "Amp Fase R:"; lS.innerText = "Amp Fase S:";
  } else if (esEspecial) {
    wB.style.display = "none"; wC.style.display = "none";
    lF.innerText = tipo === "caja" ? "Temp Caja (°C):" : (esCaja ? "Temp (°C):" : "Nivel (%):");
  } else {
    lR.innerText = "Amp Fase R:"; lS.innerText = "Amp Fase S:"; lT.innerText = "Amp Fase T:";
    wB.style.display = "contents";
    wC.style.display = (tipo === "motor") ? "none" : "contents";
    lF.innerText = (tipo === "hidraulico" && motor === "reservorio") ? "Nivel (%):" : "T Frontal:";
    lB.innerText = "T Bobina:";
    lC.innerText = (tipo === "blower") ? "T Caracol:" : "Temp C:";
  }
}

function gestionarVisibilidadVisualizacion() {
  const maquina = document.getElementById('filtroMaquina').value;
  const tipo = normalizar(document.getElementById('filtroTipo').value);
  const motor = normalizar(document.getElementById('filtroMotor').value);
  const cRST = document.getElementById('container-chartRST'), 
        tit1 = document.getElementById('titulo-grafico1'),
        tit2 = document.getElementById('titulo-grafico2');
  
  const esCaja = (tipo === "caja" || tipo === "aire" || tipo === "agua chiller" || tipo === "agua torre");
  const esServo = (tipo === "servo");
  const esEspecial = (tipo === "hidraulico" || tipo === "lubricacion" || esCaja);
  const esIntercambiador = (motor === "intercambiador");
  
  cRST.style.display = (esEspecial || esIntercambiador || (tipo === "hidraulico" && motor === "reservorio")) ? "none" : "block";
  if(esServo) cRST.style.display = "block";

  if (esServo) { tit1.innerText = "Monitor Dinámico Servo"; tit2.innerText = "Monitor Térmico Servo"; }
  else if (esIntercambiador) tit2.innerText = "Monitor Térmico Intercambiador";
  else if (tipo === "caja") tit2.innerText = "Monitor Temperatura Caja";
  else if (esCaja) tit2.innerText = "Monitor Temperatura " + tipo.toUpperCase();
  else if (esEspecial) tit2.innerText = "Monitor de Niveles";
  else { tit1.innerText = "Tendencia de Amperaje"; tit2.innerText = "Monitor Térmico"; }
}

async function loadData() {
  if (globalData.length === 0) {
    try {
      const res = await fetch(sheetURL);
      globalData = (await res.json()).slice(1);
      loadDropdowns();
      loadSelectIngreso();
    } catch (e) { console.error("Error cargando datos", e); }
  }

  const mF = document.getElementById('filtroMaquina').value;
  const tF = document.getElementById('filtroTipo').value;
  const eF = document.getElementById('filtroMotor').value;
  const tipoNorm = normalizar(tF);
  const motorNorm = normalizar(eF);

  const filtrados = globalData.filter(r => (mF===""||r[0]===mF) && (tF===""||r[1]===tF) && (eF===""||r[2]===eF));
  const labels = filtrados.map(r => r[4].split('T')[0]);

  const esServo = (tipoNorm === "servo");

  let ds1 = [];
  if (esServo) {
    // Para SERVO: Solo RPM y TORQUE en el primer gráfico
    ds1.push({ label: 'RPM', data: filtrados.map(r => r[5]), borderColor: '#ff3333', tension: 0.2 });
    ds1.push({ label: 'TORQUE', data: filtrados.map(r => r[7]), borderColor: '#33cc33', tension: 0.2 });
  } else {
    // Comportamiento normal para otros tipos
    ds1.push({ label: 'R', data: filtrados.map(r => r[5]), borderColor: '#ff3333', tension: 0.2 });
    ds1.push({ label: 'S', data: filtrados.map(r => r[6]), borderColor: '#3366ff', tension: 0.2 });
    if (mF !== "BD04") {
      ds1.push({ label: 'T', data: filtrados.map(r => r[7]), borderColor: '#33cc33', tension: 0.2 });
    }
  }

  const esCaja = (tipoNorm === "caja" || tipoNorm === "aire" || tipoNorm === "agua chiller" || tipoNorm === "agua torre");
  const esEspecial = (tipoNorm === "hidraulico" || tipoNorm === "lubricacion" || esCaja);
  const esIntercambiador = (motorNorm === "intercambiador");

  let labelPrincipal = esServo ? 'T MOTOR' : (esCaja ? (tipoNorm === "caja" ? 'TEMP CAJA' : 'TEMP') : ((esEspecial || (tipoNorm==="hidraulico" && motorNorm==="reservorio")) ? 'NIVEL' : (esIntercambiador ? 'INGRESO' : 'T-FRON')));

  let ds2 = [{ 
    label: labelPrincipal, 
    data: filtrados.map(r => r[8]), 
    borderColor: '#ffcc00', tension: 0.2 
  }];
  
  if (esServo || esIntercambiador || (!esEspecial && motorNorm !== "reservorio")) {
    ds2.push({ label: esServo ? 'T DRIVE' : (esIntercambiador ? 'RETORNO' : 'T-BOB'), data: filtrados.map(r => r[9]), borderColor: '#ff00ff', tension: 0.2 });
    if (!esServo && !esIntercambiador && tipoNorm !== "motor") {
      ds2.push({ label: 'T-CARA', data: filtrados.map(r => r[10]), borderColor: '#00ffff', tension: 0.2 });
    }
  }

  // Si es SERVO, agregamos CARGA (columna S / index 6) al segundo gráfico
  if (esServo) {
    ds2.push({ label: 'CARGA (A)', data: filtrados.map(r => r[6]), borderColor: '#3366ff', tension: 0.2 });
  }

  actualizarChart('chartRST', labels, ds1, chart1, (c) => chart1 = c);
  actualizarChart('chartTFTBTC', labels, ds2, chart2, (c) => chart2 = c);
  actualizarBadge();
  actualizarResumen();
}

function actualizarChart(id, labels, datasets, obj, save) {
  const el = document.getElementById(id);
  if (!el) return;
  const ctx = el.getContext('2d');
  if (obj) { 
    obj.data.labels = labels; 
    obj.data.datasets = datasets; 
    obj.update(); 
  } else { 
    save(new Chart(ctx, { 
      type: 'line', 
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: { legend: { labels: { font: { size: 10 } } } },
        scales: { 
          x: { grid: { color: '#333' } },
          y: { grid: { color: '#333' } }
        }
      }
    })); 
  }
}

function loadSelectIngreso() {
  const sM = document.getElementById('maquina');
  if (!sM) return;
  sM.innerHTML = '<option value="">- SELECCIONE -</option>' + [...new Set(globalData.map(r => r[0]))].map(m => `<option value="${m}">${m}</option>`).join('');
  sM.onchange = () => {
    const tipos = [...new Set(globalData.filter(r => r[0] === sM.value).map(r => r[1]))];
    document.getElementById('tipo').innerHTML = '<option value="">- TIPO -</option>' + tipos.map(t => `<option value="${t}">${t}</option>`).join('');
    document.getElementById('motor').innerHTML = '<option value="">- EQUIPO -</option>';
    gestionarVisibilidadIngreso();
  };
  document.getElementById('tipo').onchange = () => {
    const equipos = [...new Set(globalData.filter(r => r[0] === sM.value && r[1] === document.getElementById('tipo').value).map(r => r[2]))];
    document.getElementById('motor').innerHTML = '<option value="">- EQUIPO -</option>' + equipos.map(e => `<option value="${e}">${e}</option>`).join('');
    gestionarVisibilidadIngreso();
  };
}

function loadDropdowns() {
  const sM = document.getElementById('filtroMaquina');
  if (!sM) return;
  sM.innerHTML = '<option value="">TODAS</option>' + [...new Set(globalData.map(r => r[0]))].map(m => `<option value="${m}">${m}</option>`).join('');
  sM.onchange = () => {
    const tipos = [...new Set(globalData.filter(r => !sM.value || r[0] === sM.value).map(r => r[1]))];
    document.getElementById('filtroTipo').innerHTML = '<option value="">TODOS</option>' + tipos.map(t => `<option value="${t}">${t}</option>`).join('');
    gestionarVisibilidadVisualizacion();
  };
  document.getElementById('filtroTipo').onchange = () => {
    const motores = [...new Set(globalData.filter(r => (!sM.value || r[0] === sM.value) && (!document.getElementById('filtroTipo').value || r[1] === document.getElementById('filtroTipo').value)).map(r => r[2]))];
    document.getElementById('filtroMotor').innerHTML = '<option value="">TODOS</option>' + motores.map(e => `<option value="${e}">${e}</option>`).join('');
    gestionarVisibilidadVisualizacion();
  };
}

async function enviarDatos() {
  const btn = document.getElementById('btnGuardar');
  const now = new Date();
  document.getElementById('fecha').valueAsDate = now;
  document.getElementById('hora').value = now.toTimeString().slice(0,5);
  
  const datos = [
    document.getElementById('maquina').value, document.getElementById('tipo').value, 
    document.getElementById('motor').value, document.getElementById('hora').value, 
    document.getElementById('fecha').value, 
    Number(document.getElementById('r').value)||0, Number(document.getElementById('s').value)||0, 
    Number(document.getElementById('t').value)||0, Number(document.getElementById('tf').value)||0, 
    Number(document.getElementById('tb').value)||0, Number(document.getElementById('tc').value)||0
  ];

  if(!datos[0] || !datos[1] || !datos[2]) { alert("ERROR: Parámetros de identificación incompletos"); return; }
  
  btn.disabled = true;
  btn.innerText = "TRANSMITIENDO...";

  try {
    await fetch(sheetURL, { method: 'POST', body: JSON.stringify(datos) });
    alert("TRANSMISIÓN EXITOSA ✅"); 
    
    document.getElementById('r').value = "";
    document.getElementById('s').value = "";
    document.getElementById('t').value = "";
    document.getElementById('tf').value = "";
    document.getElementById('tb').value = "";
    document.getElementById('tc').value = "";
    document.getElementById('maquina').value = "";
    document.getElementById('tipo').innerHTML = '<option value="">- TIPO -</option>';
    document.getElementById('motor').innerHTML = '<option value="">- EQUIPO -</option>';
    
    globalData = []; 
    loadData();
  } catch (e) {
    alert("FALLO EN LA CONEXIÓN ❌");
  } finally {
    btn.disabled = false;
    btn.innerText = "Ejecutar Carga de Datos";
  }
}

window.onload = loadData;
</script>
</body>
</html>
